<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>快捷翻译</title>
    <script>
      window.__quickTranslateStartupCacheReset = (async () => {
        const isLocalDevHost = ['localhost', '127.0.0.1', '0.0.0.0'].includes(window.location.hostname);
        const isNativeWebView =
          window.location.protocol === 'https:' && window.location.hostname === 'localhost' ||
          window.location.protocol === 'capacitor:';

        if (!isLocalDevHost && !isNativeWebView) {
          return;
        }

        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const cacheKeys = await caches.keys();
          await Promise.all(
            cacheKeys
              .filter((cacheKey) => cacheKey.startsWith('quick-translate-'))
              .map((cacheKey) => caches.delete(cacheKey))
          );
        }
      })();

      window.__quickTranslateDevCacheReset = window.__quickTranslateStartupCacheReset;
    </script>
  </head>
  <body>
    <div id="root">
      <div style="min-height: 100vh; display: grid; place-items: center; color: #5b6472; font: 15px Microsoft YaHei UI, sans-serif;">
        正在启动快捷翻译...
      </div>
    </div>
    <script type="module" src="/src/renderer/main.tsx?v=4"></script>
  </body>
</html>
