server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/excel_forum?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&characterSetResults=utf-8
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET NAMES utf8mb4
  sql:
    init:
      mode: never
      continue-on-error: true
      encoding: UTF-8
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT 配置
jwt:
  secret: your-secret-key-here-should-be-long-and-secure-change-it
  expiration: 86400000 # 24 hours in milliseconds

# 文件存储配置
file:
  storage:
    type: local # local or minio
    local:
      path: ./uploads
      url-prefix: /uploads
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket-name: excel-forum

# 积分配置
points:
  post: 5
  reply: 2
  best-answer: 20
  like: 1

# 等级配置
level:
  thresholds: [0, 100, 500, 1000, 5000, 10000]
  names: ["新手", "入门", "熟练", "专家", "大师", "传说"]